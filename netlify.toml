# Default config = AutomationForge COMMAND CENTER
# Netlify site: automationforge-429d00fc
#
# For the user intake site (peeezmachine-appflow), set in Netlify UI:
#   Build command: node scripts/build-intake.mjs
#   Publish directory: sites/intake
#   Functions directory: netlify/functions
# Or: netlify deploy --dir=sites/intake --functions=netlify/functions

[build]
  publish = "sites/admin"
  functions = "netlify/functions"
  command = "npm install && npm install --prefix netlify/functions/submit-submission && node scripts/build-admin.mjs"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Admin SPA — never expose a public intake form on this host
[[redirects]]
  from = "/submit"
  to = "/"
  status = 302

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  publish = "sites/admin"
  functions = "netlify/functions"
